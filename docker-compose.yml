# =============================================================================
# 是飞鱼随机图API - Docker Compose 部署配置
# 使用说明：直接运行 docker compose up -d 启动服务
# =============================================================================

services:
  # 随机图API核心服务
  random-pictures:
    # 镜像配置
    image: alioth1/random-pictures-api:latest    # Docker Hub镜像（用户可替换为GitHub Packages或私有仓库地址）
    container_name: random-pictures                 # 容器名称，便于管理
    restart: always                                 # 容器异常退出时自动重启
    
    # 存储卷配置
    volumes:
      # 挂载图片目录
      - ./images:/app/images
    
    # 网络配置
    ports:
      # 端口映射：主机8081端口 -> 容器8081端口
      # 可修改为其他端口，如 "80:8081"
      - "8081:8081"
    
    # 环境变量配置
    environment:
      # ========== 基础配置 ==========
      - SITE_NAME=随机图API                          # 站点名称，显示在页面标题和logo
      - IMG_ROOT_DIR=/app/images                    # 图片根目录（固定，无需修改）
      - PORT=8081                                   # 容器内部端口（固定，无需修改）
      - PUID=1000                                   # 容器用户ID（默认1000兼容大多数Linux）
      - PGID=1000                                   # 容器组ID（默认1000兼容大多数Linux）
      
      # ========== 站点个性化配置 ==========
      # 以下配置留空则不显示对应元素
      - FAVICON_URL=                                # 站点窗口标签页图标URL，支持本地或远程图片
      - ICP_BEIAN_CODE=                             # ICP备案号，如"京ICP备12345678号"
      - ICP_BEIAN_URL=                              # 备案信息链接，如"https://beian.miit.gov.cn"
      
      # ========== 导航栏按钮配置 ==========
      # 以下配置留空则不显示对应按钮
      - NAV_HOME_URL=/                              # 首页链接（默认即可）
      - NAV_BLOG_URL=                               # 博客链接，填写后显示"博客"按钮
      - NAV_GITHUB_URL=                             # GitHub链接，填写后显示"开源地址"按钮
      - NAV_CUSTOM_TEXT=                            # 自定义按钮文本，如"关于我们"
      - NAV_CUSTOM_URL=                             # 自定义按钮链接，与上面文本配对使用
      
      # ========== 文本内容配置 ==========
      # 首页和详情页的文本内容，支持自定义
      - WELCOME_MESSAGE=欢迎使用是飞鱼随机图API     # 首页欢迎语
      - COPYRIGHT_NOTICE=本站所有图片均为用户上传，仅作学习所有，若有侵权，请与我联系我将及时删除！  # 版权声明
      
      # ========== 性能配置（可选修改） ==========
      # 建议设置为3的倍数（每行固定显示3个，确保布局整齐）
      - CATEGORY_PAGE_SIZE=6                        # 分类详情页每页显示图片数量（推荐3/6/9/12等）
      - HOME_PAGE_SIZE=6                            # 首页每页显示分类数量（推荐3/6/9/12等）

# =============================================================================